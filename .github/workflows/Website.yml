name: Website

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/Website.yml'
      - 'src/**'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      # ✅ Install .NET 10 SDK
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ✅ Restore dependencies
      - name: Restore
        run: dotnet restore src/Saascade.Blazor.Components.Documentation.Website.Wasm

      # ✅ Publish Blazor WASM
      - name: Publish
        run: dotnet publish src/Saascade.Blazor.Components.Documentation.Website.Wasm -c Release -o publish

      # ✅ Deploy to Azure Static Web Apps
      - name: Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WITTY_BUSH_0D8DDBD03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"

          # 👇 IMPORTANT: point directly to built static files
          app_location: "publish/wwwroot"
          output_location: ""
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job

    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WITTY_BUSH_0D8DDBD03 }}
          action: "close"