<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAAScade Blazor Components Documentation</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />

    <link rel="stylesheet" href="_content/Saascade.Blazor.Components/css/reset.css" />
    <link rel="stylesheet" href="_content/Saascade.Blazor.Components/css/blazor.css" />

    <link href="Saascade.Blazor.Components.Documentation.Website.Wasm.styles.css" rel="stylesheet" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/blazor.css" />
    <link rel="stylesheet" href="css/app.css" />

    <script type="importmap"></script>

    <!-- The stylesheets etc for the selected component library gets magically injected at the end of the head section here -->
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script>
        window.scrollToTop = function () {
            window.scrollTo({ top: 0, left: 0, behavior: 'instant' });
        };
    </script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>

    <!-- Design system JavaScript references magically get injected at the end of the body -->
</body>
</html>
